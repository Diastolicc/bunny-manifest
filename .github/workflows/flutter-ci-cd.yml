name: Flutter CI/CD Pipeline

on:
  push:
    branches: 
      - main
      - sandbox
      - develop
  pull_request:
    branches: 
      - main
      - sandbox

env:
  JAVA_VERSION: '17'

jobs:
  # Job 1: Run tests and code analysis
  test:
    name: Test & Analyze
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter (Latest Stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Create firebase_options.dart placeholder
        run: |
          mkdir -p lib
          cat > lib/firebase_options.dart << 'EOF'
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;
          import 'package:flutter/foundation.dart' show defaultTargetPlatform, kIsWeb, TargetPlatform;

          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform {
              if (kIsWeb) {
                return web;
              }
              switch (defaultTargetPlatform) {
                case TargetPlatform.android:
                  return android;
                case TargetPlatform.iOS:
                  return ios;
                default:
                  throw UnsupportedError('DefaultFirebaseOptions are not supported for this platform.');
              }
            }

            static const FirebaseOptions web = FirebaseOptions(
              apiKey: 'test-api-key',
              appId: '1:123456789:web:abcdef',
              messagingSenderId: '123456789',
              projectId: 'test-project',
              authDomain: 'test-project.firebaseapp.com',
              storageBucket: 'test-project.appspot.com',
            );

            static const FirebaseOptions android = FirebaseOptions(
              apiKey: 'test-api-key',
              appId: '1:123456789:android:abcdef',
              messagingSenderId: '123456789',
              projectId: 'test-project',
              storageBucket: 'test-project.appspot.com',
            );

            static const FirebaseOptions ios = FirebaseOptions(
              apiKey: 'test-api-key',
              appId: '1:123456789:ios:abcdef',
              messagingSenderId: '123456789',
              projectId: 'test-project',
              storageBucket: 'test-project.appspot.com',
              iosBundleId: 'com.example.bunny',
            );
          }
          EOF

      - name: Generate code with build_runner
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .
        continue-on-error: true

      - name: Analyze code
        run: flutter analyze
        continue-on-error: true

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
        continue-on-error: true

  # Job 2: Build Android APK
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter (Latest Stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Create firebase_options.dart placeholder
        run: |
          mkdir -p lib
          cat > lib/firebase_options.dart << 'EOF'
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;
          import 'package:flutter/foundation.dart' show defaultTargetPlatform, kIsWeb, TargetPlatform;

          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform {
              if (kIsWeb) {
                return web;
              }
              switch (defaultTargetPlatform) {
                case TargetPlatform.android:
                  return android;
                case TargetPlatform.iOS:
                  return ios;
                default:
                  throw UnsupportedError('DefaultFirebaseOptions are not supported for this platform.');
              }
            }

            static const FirebaseOptions web = FirebaseOptions(
              apiKey: 'test-api-key',
              appId: '1:123456789:web:abcdef',
              messagingSenderId: '123456789',
              projectId: 'test-project',
              authDomain: 'test-project.firebaseapp.com',
              storageBucket: 'test-project.appspot.com',
            );

            static const FirebaseOptions android = FirebaseOptions(
              apiKey: 'test-api-key',
              appId: '1:123456789:android:abcdef',
              messagingSenderId: '123456789',
              projectId: 'test-project',
              storageBucket: 'test-project.appspot.com',
            );

            static const FirebaseOptions ios = FirebaseOptions(
              apiKey: 'test-api-key',
              appId: '1:123456789:ios:abcdef',
              messagingSenderId: '123456789',
              projectId: 'test-project',
              storageBucket: 'test-project.appspot.com',
              iosBundleId: 'com.example.bunny',
            );
          }
          EOF

      - name: Generate code with build_runner
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" | base64 --decode > android/app/google-services.json

      - name: Build APK (Debug - for sandbox)
        if: github.ref == 'refs/heads/sandbox'
        run: flutter build apk --debug

      - name: Build APK (Release - for main)
        if: github.ref == 'refs/heads/main'
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ github.ref_name }}
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30

  # Job 3: Build Android App Bundle (AAB) - Only for main branch
  build-android-bundle:
    name: Build Android App Bundle
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter (Latest Stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Create firebase_options.dart placeholder
        run: |
          mkdir -p lib
          cat > lib/firebase_options.dart << 'EOF'
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;
          import 'package:flutter/foundation.dart' show defaultTargetPlatform, kIsWeb, TargetPlatform;

          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform {
              if (kIsWeb) {
                return web;
              }
              switch (defaultTargetPlatform) {
                case TargetPlatform.android:
                  return android;
                case TargetPlatform.iOS:
                  return ios;
                default:
                  throw UnsupportedError('DefaultFirebaseOptions are not supported for this platform.');
              }
            }

            static const FirebaseOptions web = FirebaseOptions(
              apiKey: 'test-api-key',
              appId: '1:123456789:web:abcdef',
              messagingSenderId: '123456789',
              projectId: 'test-project',
              authDomain: 'test-project.firebaseapp.com',
              storageBucket: 'test-project.appspot.com',
            );

            static const FirebaseOptions android = FirebaseOptions(
              apiKey: 'test-api-key',
              appId: '1:123456789:android:abcdef',
              messagingSenderId: '123456789',
              projectId: 'test-project',
              storageBucket: 'test-project.appspot.com',
            );

            static const FirebaseOptions ios = FirebaseOptions(
              apiKey: 'test-api-key',
              appId: '1:123456789:ios:abcdef',
              messagingSenderId: '123456789',
              projectId: 'test-project',
              storageBucket: 'test-project.appspot.com',
              iosBundleId: 'com.example.bunny',
            );
          }
          EOF

      - name: Generate code with build_runner
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Decode google-services.json
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: echo "$GOOGLE_SERVICES_JSON" | base64 --decode > android/app/google-services.json

      - name: Build App Bundle
        run: flutter build appbundle --release

      - name: Upload App Bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-bundle-${{ github.ref_name }}
          path: build/app/outputs/bundle/release/*.aab
          retention-days: 30

  # Job 4: Build Web Admin
  build-web:
    name: Build Web Admin
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter (Latest Stable)
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Create firebase_options.dart placeholder
        run: |
          mkdir -p lib
          cat > lib/firebase_options.dart << 'EOF'
          import 'package:firebase_core/firebase_core.dart' show FirebaseOptions;
          import 'package:flutter/foundation.dart' show defaultTargetPlatform, kIsWeb, TargetPlatform;

          class DefaultFirebaseOptions {
            static FirebaseOptions get currentPlatform {
              if (kIsWeb) {
                return web;
              }
              switch (defaultTargetPlatform) {
                case TargetPlatform.android:
                  return android;
                case TargetPlatform.iOS:
                  return ios;
                default:
                  throw UnsupportedError('DefaultFirebaseOptions are not supported for this platform.');
              }
            }

            static const FirebaseOptions web = FirebaseOptions(
              apiKey: 'test-api-key',
              appId: '1:123456789:web:abcdef',
              messagingSenderId: '123456789',
              projectId: 'test-project',
              authDomain: 'test-project.firebaseapp.com',
              storageBucket: 'test-project.appspot.com',
            );

            static const FirebaseOptions android = FirebaseOptions(
              apiKey: 'test-api-key',
              appId: '1:123456789:android:abcdef',
              messagingSenderId: '123456789',
              projectId: 'test-project',
              storageBucket: 'test-project.appspot.com',
            );

            static const FirebaseOptions ios = FirebaseOptions(
              apiKey: 'test-api-key',
              appId: '1:123456789:ios:abcdef',
              messagingSenderId: '123456789',
              projectId: 'test-project',
              storageBucket: 'test-project.appspot.com',
              iosBundleId: 'com.example.bunny',
            );
          }
          EOF

      - name: Generate code with build_runner
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Build Web Admin (Sandbox)
        if: github.ref == 'refs/heads/sandbox'
        run: flutter build web --target lib/web_admin_main.dart --web-renderer canvaskit

      - name: Build Web Admin (Production)
        if: github.ref == 'refs/heads/main'
        run: flutter build web --target lib/web_admin_main.dart --web-renderer canvaskit --release

      - name: Upload Web build
        uses: actions/upload-artifact@v4
        with:
          name: web-admin-${{ github.ref_name }}
          path: build/web/
          retention-days: 30

  # Job 5: Deploy to Firebase Hosting (Optional - only for main)
  deploy-web:
    name: Deploy Web to Firebase
    runs-on: ubuntu-latest
    needs: build-web
    if: github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: web-admin-${{ github.ref_name }}
          path: build/web

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
        continue-on-error: true

  # Job 6: Build status notification
  notify:
    name: Build Status Summary
    runs-on: ubuntu-latest
    needs: [test, build-android, build-web]
    if: always()
    
    steps:
      - name: Build Summary
        run: |
          echo "## 🚀 Build Summary for ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Job Status:" >> $GITHUB_STEP_SUMMARY
          echo "- Tests: ${{ needs.test.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Android Build: ${{ needs.build-android.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Web Build: ${{ needs.build-web.result }}" >> $GITHUB_STEP_SUMMARY