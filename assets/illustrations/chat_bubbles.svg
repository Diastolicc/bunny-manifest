<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Chat background -->
  <circle cx="60" cy="60" r="50" fill="#E17055" opacity="0.1"/>
  
  <!-- Chat bubble 1 (left) -->
  <ellipse cx="45" cy="45" rx="25" ry="20" fill="#E17055"/>
  <path d="M35 60 L25 70 L35 65 Z" fill="#E17055"/>
  
  <!-- Chat bubble 2 (right) -->
  <ellipse cx="75" cy="65" rx="25" ry="20" fill="#4ECDC4"/>
  <path d="M85 80 L95 90 L85 85 Z" fill="#4ECDC4"/>
  
  <!-- Message lines in bubble 1 -->
  <rect x="35" y="40" width="15" height="3" rx="1.5" fill="white" opacity="0.8"/>
  <rect x="35" y="46" width="20" height="3" rx="1.5" fill="white" opacity="0.8"/>
  <rect x="35" y="52" width="12" height="3" rx="1.5" fill="white" opacity="0.8"/>
  
  <!-- Message lines in bubble 2 -->
  <rect x="65" y="60" width="18" height="3" rx="1.5" fill="white" opacity="0.8"/>
  <rect x="65" y="66" width="14" height="3" rx="1.5" fill="white" opacity="0.8"/>
  <rect x="65" y="72" width="16" height="3" rx="1.5" fill="white" opacity="0.8"/>
  
  <!-- People avatars -->
  <!-- Person 1 -->
  <circle cx="25" cy="35" r="6" fill="#FF6B6B"/>
  <rect x="22" y="41" width="6" height="8" rx="3" fill="#45B7D1"/>
  
  <!-- Person 2 -->
  <circle cx="95" cy="55" r="6" fill="#96CEB4"/>
  <rect x="92" y="61" width="6" height="8" rx="3" fill="#FFEAA7"/>
  
  <!-- Online indicators -->
  <circle cx="30" cy="30" r="3" fill="#00B894"/>
  <circle cx="100" cy="50" r="3" fill="#00B894"/>
  
  <!-- Typing indicator -->
  <circle cx="50" cy="75" r="2" fill="#333" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="55" cy="75" r="2" fill="#333" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="1.5s" begin="0.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="60" cy="75" r="2" fill="#333" opacity="0.6">
    <animate attributeName="opacity" values="0.6;1;0.6" dur="1.5s" begin="0.4s" repeatCount="indefinite"/>
  </circle>
</svg>
