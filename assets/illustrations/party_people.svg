<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Party background -->
  <circle cx="60" cy="60" r="50" fill="#00B894" opacity="0.1"/>
  
  <!-- People dancing -->
  <!-- Person 1 -->
  <circle cx="40" cy="45" r="8" fill="#FF6B6B"/>
  <rect x="36" y="53" width="8" height="12" rx="4" fill="#4ECDC4"/>
  <rect x="34" y="50" width="4" height="8" rx="2" fill="#45B7D1"/>
  <rect x="46" y="50" width="4" height="8" rx="2" fill="#45B7D1"/>
  
  <!-- Person 2 (center) -->
  <circle cx="60" cy="40" r="10" fill="#96CEB4"/>
  <rect x="55" y="50" width="10" height="15" rx="5" fill="#FFEAA7"/>
  <rect x="50" y="48" width="5" height="10" rx="2" fill="#DDA0DD"/>
  <rect x="65" y="48" width="5" height="10" rx="2" fill="#DDA0DD"/>
  
  <!-- Person 3 -->
  <circle cx="80" cy="50" r="8" fill="#45B7D1"/>
  <rect x="76" y="58" width="8" height="12" rx="4" fill="#FF6B6B"/>
  <rect x="74" y="55" width="4" height="8" rx="2" fill="#4ECDC4"/>
  <rect x="82" y="55" width="4" height="8" rx="2" fill="#4ECDC4"/>
  
  <!-- Party decorations -->
  <!-- Confetti -->
  <rect x="20" y="20" width="3" height="3" rx="1" fill="#FFD700"/>
  <rect x="90" y="25" width="3" height="3" rx="1" fill="#FF6B6B"/>
  <rect x="25" y="80" width="3" height="3" rx="1" fill="#4ECDC4"/>
  <rect x="95" y="85" width="3" height="3" rx="1" fill="#45B7D1"/>
  
  <!-- Music notes -->
  <circle cx="30" cy="30" r="2" fill="#333"/>
  <path d="M32 30 Q35 25 38 30" stroke="#333" stroke-width="2" fill="none"/>
  
  <circle cx="85" cy="25" r="2" fill="#333"/>
  <path d="M87 25 Q90 20 93 25" stroke="#333" stroke-width="2" fill="none"/>
  
  <!-- Celebration emoji -->
  <text x="60" y="90" text-anchor="middle" font-size="20">🎉</text>
